app:
  name: alpha-oracle
  environment: development  # development | paper | live
  log_level: INFO

broker:
  provider: ibkr
  paper_trading: true
  ibkr:
    host: 127.0.0.1
    port: 4002            # IB Gateway paper=4002, live=4001; TWS paper=7497, live=7496
    client_id: 1
    account_id: ""        # leave blank for single-account setups

data:
  alpha_vantage:
    rate_limit_per_minute: 5
    cache_ttl_hours: 24
  edgar:
    user_agent: "alpha-oracle bot@example.com"
    rate_limit_per_second: 10
  universe:
    indices: ["sp500"]          # options: sp500, sp400, sp600 — add sp400/sp600 to expand universe
    min_adv_threshold: 0        # minimum 30-day avg daily volume (0 = disabled)
  feed:
    feed_type: iex          # iex (free, delayed) | sip (paid, real-time)
    symbols_per_connection: 200
    reconnect_delay_seconds: 5
    max_reconnect_attempts: 10

database:
  url: postgresql+asyncpg://trader:dev_password@localhost:5432/stock_analysis
  pool_size: 10
  max_overflow: 20

redis:
  url: redis://localhost:6379/0
  cache_ttl_seconds: 3600

strategy:
  min_sharpe_ratio: 1.0
  min_profit_factor: 1.5
  max_drawdown_pct: 20.0
  min_trades: 100
  walk_forward:
    train_months: 24
    test_months: 6
    step_months: 3
  ranking_weights:
    sharpe: 0.30
    sortino: 0.20
    max_drawdown_inverse: 0.20
    profit_factor: 0.15
    consistency: 0.15

execution:
  default_order_type: limit
  limit_offset_pct: 0.05
  max_slippage_pct: 0.10
  position_sizing: half_kelly

monitoring:
  prometheus_port: 8001
  health_check_interval_seconds: 60

ml:
  prediction_horizon: 5
  up_threshold: 0.01
  down_threshold: -0.01
  min_training_samples: 500
  retrain_interval_days: 7
  model_staleness_days: 14
  confidence_threshold: 0.55

scheduler:
  enabled: true
  daily_bars_cron: "0 17 * * 1-5"
  weekly_fundamentals_cron: "0 6 * * 6"
  biweekly_altdata_cron: "0 7 1,15 * *"
  weekly_retrain_cron: "0 2 * * 0"
  weekly_options_flow_cron: "0 7 * * 6"
  weekly_trends_cron: "30 7 * * 6"

router:
  size_threshold_small_pct: 0.1
  size_threshold_large_pct: 1.0
  twap_num_slices: 5
  twap_interval_seconds: 60
  wide_spread_threshold_bps: 20.0

notifications:
  enabled: false
  channels: []  # slack, telegram

agent:
  provider: anthropic
  analyst_model: claude-sonnet-4-20250514
  advisor_model: claude-haiku-4-5-20251001
  briefing_model: claude-sonnet-4-20250514
  temperature: 0.0
  max_input_tokens: 50000
  max_output_tokens: 4096
  daily_budget_usd: 5.0
  monthly_budget_usd: 100.0
  enabled: true
  cache_ttl_seconds: 14400
  rate_limit_analyses_per_hour: 10
  rate_limit_recommendations_per_hour: 50

sentiment:
  model_name: ProsusAI/finbert
  device: cpu
  batch_size: 32
  cache_ttl_seconds: 86400
  max_articles_per_symbol: 20

options_flow:
  provider: stub
  enabled: false

trends:
  provider: stub
  enabled: false
